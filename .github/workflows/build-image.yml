name: build-image
on:
  workflow_dispatch: # manual
jobs:
  build:
    runs-on: ubuntu-latest
    steps: 
      - name: checkout repo
        uses: actions/checkout@v4
      - name: use node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm install
      - run: npm run build
  test:
    runs-on: ubuntu-latest
    needs: build
    steps: 
      - name: checkout repo
        uses: actions/checkout@v4
      - name: use node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm install
      - run: npm test
  build-image:
    runs-on: ubuntu-latest
    environment:
      name: Production
    needs: test
    strategy:
      matrix:
        include:
          - name: linux
            dockerfile: Dockerfile
            platforms: linux/amd64,linux/arm64,linux/arm/v7
            tags: |
              ${{ secrets.DOCKERHUB_USER }}/dvop400-finalproject:latest
              ${{ secrets.DOCKERHUB_USER }}/dvop400-finalproject:${{ github.sha }}-linux
          - name: windows
            dockerfile: Dockerfile.windows
            platforms: windows/amd64
            tags: |
              ${{ secrets.DOCKERHUB_USER }}/dvop400-finalproject:windows-latest
              ${{ secrets.DOCKERHUB_USER }}/dvop400-finalproject:${{ github.sha }}-windows
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
      - name: set up buildx
        uses: docker/setup-buildx-action@v3
      - name: login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: ./${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ matrix.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
