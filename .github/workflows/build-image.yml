name: build-image
on:
  workflow_dispatch: # manual
jobs:
  build:
    runs-on: ubuntu-latest
    steps: 
      - name: checkout repo
        uses: actions/checkout@v4
      - name: use node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm install
      - run: npm run build
  test:
    runs-on: ubuntu-latest
    needs: build
    steps: 
      - name: checkout repo
        uses: actions/checkout@v4
      - name: use node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm install
      - run: npm test
  build-image:
    runs-on: ubuntu-latest
    environment:
      name: Production
    needs: test
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
      - name: set up buildx
        uses: docker/setup-buildx-action@v3
      - name: login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: build and push multi-platform image (linux only)
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USER }}/dvop400-finalproject:latest
            ${{ secrets.DOCKERHUB_USER }}/dvop400-finalproject:${{ github.sha }}-linux
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # NOTE: Building Windows container images requires a Windows host
      # (self-hosted runner or local Docker on Windows). GitHub-hosted
      # Linux runners cannot build Windows containers natively. To build
      # the Windows variant, run the following locally on a Windows machine
      # or provide a self-hosted Windows runner and uncomment/enable a
      # dedicated Windows job that runs `docker build -f Dockerfile.windows ...`.
