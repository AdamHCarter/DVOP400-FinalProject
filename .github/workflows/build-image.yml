name: build-image
on:
  workflow_dispatch: # manual
jobs:
  build:
    runs-on: ubuntu-latest
    steps: 
      - name: checkout repo
        uses: actions/checkout@v4
      - name: use node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm install
      - run: npm run build
  test:
    runs-on: ubuntu-latest
    needs: build
    steps: 
      - name: checkout repo
        uses: actions/checkout@v4
      - name: use node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm install
      - run: npm test
  build-image:
    runs-on: ubuntu-latest
    environment:
      name: Production
    needs: test
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build docker image
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - run: docker build -t ${{ secrets.DOCKERHUB_USER }}/dvop400-finalproject:latest .
        working-directory: .
      - run: docker push ${{ secrets.DOCKERHUB_USER }}/dvop400-finalproject:latest
        working-directory: .
