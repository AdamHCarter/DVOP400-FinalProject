services:
  app:
    build:
      context: .
      target: runner
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    container_name: dvop400-finalproject
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/index.html"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
